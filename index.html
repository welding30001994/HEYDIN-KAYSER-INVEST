<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>HEYDIN KAYSER INVEST - Sistema Cuántico de Gestión</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap');
        
        :root {
            --primary-glow: #00f3ff;
            --secondary-glow: #9d00ff;
            --bg-dark: #0a0a0f;
            --bg-card: rgba(20, 20, 30, 0.8);
            --text-primary: #e0e0ff;
            --text-secondary: #a0a0ff;
            --success-glow: #00ff9d;
            --warning-glow: #ffd700;
            --gold: #ffd700;
            --neon-pink: #ff00ff;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Rajdhani', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2f 100%);
            color: var(--text-primary);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Efecto de grid holográfico responsivo */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: min(30px, 5vw) min(30px, 5vw);
            pointer-events: none;
            z-index: 1;
        }
        
        .container {
            position: relative;
            z-index: 2;
            max-width: 1600px;
            margin: 0 auto;
            padding: clamp(10px, 3vw, 20px);
            width: 100%;
        }
        
        /* Header responsivo */
        .header {
            text-align: center;
            padding: clamp(20px, 5vw, 50px) clamp(10px, 3vw, 20px);
            margin-bottom: clamp(15px, 4vw, 30px);
            background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.1), transparent);
            border-bottom: 3px solid var(--gold);
            box-shadow: 0 0 min(50px, 5vw) rgba(255, 215, 0, 0.3);
            animation: goldPulse 3s infinite;
            position: relative;
            width: 100%;
        }
        
        @keyframes goldPulse {
            0%, 100% { box-shadow: 0 0 min(50px, 5vw) rgba(255, 215, 0, 0.3); }
            50% { box-shadow: 0 0 min(80px, 8vw) rgba(157, 0, 255, 0.5); }
        }
        
        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.8rem, 8vw, 4.5rem);
            font-weight: 900;
            text-transform: uppercase;
            background: linear-gradient(45deg, var(--gold), var(--primary-glow), var(--secondary-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: clamp(2px, 1vw, 8px);
            animation: titleFlicker 4s infinite;
            text-shadow: 0 0 min(30px, 3vw) rgba(255, 215, 0, 0.5);
            word-break: break-word;
        }
        
        .header h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1rem, 4vw, 1.8rem);
            color: var(--gold);
            margin-top: 10px;
            letter-spacing: clamp(1px, 0.5vw, 4px);
            text-shadow: 0 0 min(20px, 2vw) var(--gold);
            word-break: break-word;
        }
        
        @keyframes titleFlicker {
            0%, 100% { opacity: 1; }
            92% { opacity: 1; }
            93% { opacity: 0.8; }
            94% { opacity: 1; }
            95% { opacity: 0.9; }
            96% { opacity: 1; }
        }
        
        /* Navegación responsiva */
        .nav-bar {
            display: flex;
            gap: clamp(10px, 2vw, 20px);
            margin-bottom: clamp(20px, 4vw, 30px);
            justify-content: center;
            flex-wrap: wrap;
            padding: 0 10px;
        }
        
        .nav-btn {
            padding: clamp(12px, 3vw, 18px) clamp(20px, 5vw, 40px);
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold);
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1rem, 3.5vw, 1.3rem);
            border-radius: min(15px, 3vw);
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-transform: uppercase;
            letter-spacing: clamp(1px, 0.5vw, 2px);
            position: relative;
            overflow: hidden;
            flex: 0 1 auto;
            min-width: fit-content;
            white-space: nowrap;
        }
        
        @media (max-width: 480px) {
            .nav-btn {
                white-space: normal;
                text-align: center;
                width: 100%;
            }
        }
        
        .nav-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.3), transparent);
            transition: left 0.5s ease;
        }
        
        .nav-btn:hover::before {
            left: 100%;
        }
        
        .nav-btn:hover {
            background: rgba(255, 215, 0, 0.1);
            box-shadow: 0 0 min(40px, 5vw) var(--gold);
            transform: scale(1.05);
        }
        
        .nav-btn.active {
            background: linear-gradient(45deg, var(--gold), var(--primary-glow));
            color: var(--bg-dark);
            border-color: transparent;
            font-weight: bold;
        }
        
        /* Grid responsivo */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(100%, 350px), 1fr));
            gap: clamp(15px, 3vw, 30px);
            margin-bottom: clamp(20px, 5vw, 40px);
            padding: 0 10px;
        }
        
        /* Tarjetas responsivas */
        .card {
            background: var(--bg-card);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: min(25px, 5vw);
            padding: clamp(20px, 4vw, 35px);
            box-shadow: 0 0 min(40px, 5vw) rgba(255, 215, 0, 0.2);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            width: 100%;
        }
        
        .card::before {
            content: '';
            position: absolute;
            top: -3px;
            left: -3px;
            right: -3px;
            bottom: -3px;
            background: linear-gradient(45deg, var(--gold), var(--primary-glow), var(--secondary-glow), var(--gold));
            border-radius: min(27px, 5.5vw);
            z-index: -1;
            animation: borderRotate 6s linear infinite;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        
        .card:hover::before {
            opacity: 1;
        }
        
        .card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 0 min(70px, 8vw) rgba(255, 215, 0, 0.4);
        }
        
        @keyframes borderRotate {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }
        
        .card-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.3rem, 4vw, 2rem);
            margin-bottom: clamp(15px, 4vw, 30px);
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: clamp(1px, 0.5vw, 3px);
            border-bottom: 2px solid rgba(255, 215, 0, 0.3);
            padding-bottom: clamp(10px, 2vw, 15px);
            text-shadow: 0 0 min(15px, 2vw) var(--gold);
            word-break: break-word;
        }
        
        /* Inputs responsivos */
        .input-group {
            margin-bottom: clamp(15px, 3vw, 25px);
            position: relative;
            width: 100%;
        }
        
        .input-group label {
            display: block;
            margin-bottom: clamp(5px, 1.5vw, 10px);
            font-size: clamp(1rem, 3vw, 1.2rem);
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: clamp(1px, 0.3vw, 2px);
            font-weight: 600;
            word-break: break-word;
        }
        
        .futuristic-input {
            width: 100%;
            padding: clamp(12px, 3vw, 18px);
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: min(12px, 3vw);
            color: var(--text-primary);
            font-size: clamp(1rem, 3.5vw, 1.3rem);
            font-family: 'Rajdhani', sans-serif;
            transition: all 0.3s ease;
            position: relative;
            z-index: 1;
        }
        
        .futuristic-input:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 min(30px, 4vw) rgba(255, 215, 0, 0.5);
            background: rgba(0, 0, 0, 0.8);
        }
        
        /* Selector de porcentaje responsivo */
        .percentage-range {
            margin-top: 20px;
            padding: clamp(15px, 3vw, 20px);
            background: rgba(255, 215, 0, 0.05);
            border-radius: min(15px, 3vw);
            border: 1px solid rgba(255, 215, 0, 0.2);
            width: 100%;
        }
        
        .range-title {
            color: var(--gold);
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            word-break: break-word;
        }
        
        .range-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(60px, 25vw), 1fr));
            gap: clamp(5px, 1vw, 8px);
            width: 100%;
        }
        
        .small-btn {
            padding: clamp(8px, 2vw, 10px) clamp(3px, 1.5vw, 5px);
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: min(6px, 2vw);
            color: var(--text-secondary);
            font-size: clamp(0.7rem, 2.5vw, 0.9rem);
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            white-space: nowrap;
        }
        
        @media (max-width: 480px) {
            .small-btn {
                white-space: normal;
                font-size: 0.8rem;
                padding: 8px 2px;
            }
        }
        
        .small-btn:hover {
            background: rgba(255, 215, 0, 0.1);
            border-color: var(--gold);
            color: var(--gold);
            transform: scale(1.05);
        }
        
        /* Botones de acción responsivos */
        .action-buttons {
            display: flex;
            gap: clamp(10px, 2vw, 20px);
            margin-top: 30px;
            flex-wrap: wrap;
            padding: 0 10px;
        }
        
        .action-btn {
            flex: 1 1 min(200px, 100%);
            min-width: min(200px, 100%);
            padding: clamp(15px, 3vw, 18px) clamp(15px, 4vw, 25px);
            font-size: clamp(1rem, 3.5vw, 1.2rem);
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: clamp(1px, 0.5vw, 2px);
            background: transparent;
            border: 2px solid;
            border-radius: min(12px, 3vw);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            word-break: break-word;
        }
        
        .save-btn {
            border-color: var(--gold);
            color: var(--gold);
        }
        
        .html-btn {
            border-color: var(--primary-glow);
            color: var(--primary-glow);
        }
        
        .pdf-btn {
            border-color: var(--secondary-glow);
            color: var(--secondary-glow);
        }
        
        /* Selector de inversionistas */
        .investor-selector {
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 215, 0, 0.1);
            border-radius: min(15px, 3vw);
            border: 2px solid var(--gold);
        }
        
        .investor-selector select {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid var(--gold);
            border-radius: 10px;
            color: var(--gold);
            font-size: 1.2em;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .investor-selector select option {
            background: var(--bg-dark);
            color: var(--text-primary);
        }
        
        /* Tabla responsiva */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin: 20px 0;
            border-radius: min(15px, 3vw);
        }
        
        .results-table {
            width: 100%;
            min-width: 800px;
            border-collapse: collapse;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 215, 0, 0.3);
        }
        
        .results-table th {
            background: linear-gradient(45deg, rgba(255, 215, 0, 0.2), rgba(157, 0, 255, 0.2));
            padding: clamp(12px, 2vw, 18px);
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--gold);
            color: var(--gold);
            white-space: nowrap;
        }
        
        .results-table td {
            padding: clamp(10px, 1.5vw, 15px);
            text-align: center;
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
            font-size: clamp(0.9rem, 2.2vw, 1.1rem);
            white-space: nowrap;
        }
        
        .results-table tr:hover {
            background: rgba(255, 215, 0, 0.1);
        }
        
        .highlight {
            color: var(--success-glow);
            font-weight: bold;
            text-shadow: 0 0 10px var(--success-glow);
        }
        
        .gold-highlight {
            color: var(--gold);
            font-weight: bold;
            text-shadow: 0 0 10px var(--gold);
        }
        
        /* Total box responsivo */
        .total-box {
            background: linear-gradient(45deg, rgba(255, 215, 0, 0.15), rgba(157, 0, 255, 0.15));
            border-radius: min(20px, 4vw);
            padding: clamp(20px, 4vw, 25px);
            text-align: center;
            margin-top: 30px;
            border: 2px solid var(--gold);
            box-shadow: 0 0 min(30px, 4vw) rgba(255, 215, 0, 0.3);
            width: 100%;
        }
        
        .total-box h3 {
            font-size: clamp(1.5rem, 5vw, 2.2rem);
            margin-bottom: 15px;
            color: var(--gold);
            text-transform: uppercase;
            word-break: break-word;
        }
        
        .total-box .amount {
            font-size: clamp(2rem, 8vw, 3.5rem);
            font-weight: bold;
            background: linear-gradient(45deg, var(--gold), var(--primary-glow), var(--secondary-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
            word-break: break-word;
        }
        
        /* Grid de información responsiva */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(150px, 100%), 1fr));
            gap: clamp(10px, 2vw, 20px);
            margin-bottom: 30px;
        }
        
        .info-box {
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid var(--gold);
            border-radius: min(15px, 3vw);
            padding: clamp(15px, 3vw, 20px);
            text-align: center;
        }
        
        .info-box .label {
            color: var(--text-secondary);
            font-size: clamp(0.9rem, 2.2vw, 1.1rem);
            margin-bottom: 8px;
            word-break: break-word;
        }
        
        .info-box .value {
            color: var(--gold);
            font-size: clamp(1.2rem, 4vw, 2rem);
            font-weight: bold;
            word-break: break-word;
        }
        
        /* Vista previa responsiva */
        #vistaPrevia {
            width: 100%;
            overflow-x: auto;
        }
        
        /* Animaciones */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .float {
            animation: float 4s ease-in-out infinite;
        }
        
        /* Mejoras táctiles para móviles */
        @media (max-width: 768px) {
            .action-btn, .nav-btn, .small-btn {
                -webkit-tap-highlight-color: transparent;
                touch-action: manipulation;
            }
            
            .futuristic-input {
                font-size: 16px; /* Evita zoom en iOS */
            }
            
            .card:hover {
                transform: none;
            }
            
            .card:active {
                transform: scale(0.98);
            }
        }

        /* Estilos para PDF - Exactamente igual al HTML */
        .pdf-report {
            background: linear-gradient(135deg, #0a0a0f, #1a1a2f);
            color: #e0e0ff;
            font-family: 'Rajdhani', sans-serif;
            padding: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .pdf-report .gold-text {
            color: #ffd700;
            font-weight: bold;
        }
        
        .pdf-report .highlight-green {
            color: #00ff9d;
            font-weight: bold;
        }
        
        .pdf-report .info-box-pdf {
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid #ffd700;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
        }
        
        .pdf-report table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 215, 0, 0.3);
        }
        
        .pdf-report th {
            background: linear-gradient(45deg, rgba(255, 215, 0, 0.2), rgba(157, 0, 255, 0.2));
            padding: 15px;
            color: #ffd700;
            border-bottom: 2px solid #ffd700;
            font-family: 'Orbitron', sans-serif;
        }
        
        .pdf-report td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚡ HEYDIN KAYSER ⚡</h1>
            <h2>INVEST • SISTEMA CUÁNTICO DE GESTIÓN</h2>
        </div>
        
        <div class="nav-bar">
            <button class="nav-btn active" onclick="showSection('calculator')">📊 CALCULADORA</button>
            <button class="nav-btn" onclick="showSection('results')">📈 RESULTADOS</button>
        </div>
        
        <!-- Sección de Calculadora -->
        <div id="calculator-section">
            <div class="dashboard-grid">
                <!-- Tarjeta de Datos Personales -->
                <div class="card float">
                    <h2 class="card-title">👤 DATOS DEL INVERSIONISTA</h2>
                    <div class="input-group">
                        <label>NOMBRE COMPLETO</label>
                        <input type="text" id="nombre" class="futuristic-input" placeholder="INGRESE SU NOMBRE">
                    </div>
                    <div class="input-group">
                        <label>APELLIDO</label>
                        <input type="text" id="apellido" class="futuristic-input" placeholder="INGRESE SU APELLIDO">
                    </div>
                    <div class="input-group">
                        <label>MONTO DE INVERSIÓN ($)</label>
                        <input type="number" id="inversion" class="futuristic-input" placeholder="0.00" min="0" step="0.01">
                    </div>
                </div>
                
                <!-- Tarjeta de Configuración de Rendimiento -->
                <div class="card float" style="animation-delay: 0.5s;">
                    <h2 class="card-title">📈 RENDIMIENTO DIARIO</h2>
                    
                    <!-- Selector de porcentajes precisos -->
                    <div class="percentage-range">
                        <div class="range-title">PORCENTAJES PRECISOS 0.01% - 15%</div>
                        <div class="range-buttons">
                            <button class="small-btn" onclick="setPercentage(0.01)">0.01%</button>
                            <button class="small-btn" onclick="setPercentage(0.05)">0.05%</button>
                            <button class="small-btn" onclick="setPercentage(0.10)">0.10%</button>
                            <button class="small-btn" onclick="setPercentage(0.25)">0.25%</button>
                            <button class="small-btn" onclick="setPercentage(0.50)">0.50%</button>
                            <button class="small-btn" onclick="setPercentage(0.75)">0.75%</button>
                            <button class="small-btn" onclick="setPercentage(1)">1%</button>
                            <button class="small-btn" onclick="setPercentage(1.5)">1.5%</button>
                            <button class="small-btn" onclick="setPercentage(2)">2%</button>
                            <button class="small-btn" onclick="setPercentage(2.5)">2.5%</button>
                            <button class="small-btn" onclick="setPercentage(3)">3%</button>
                            <button class="small-btn" onclick="setPercentage(4)">4%</button>
                            <button class="small-btn" onclick="setPercentage(5)">5%</button>
                            <button class="small-btn" onclick="setPercentage(6)">6%</button>
                            <button class="small-btn" onclick="setPercentage(7)">7%</button>
                            <button class="small-btn" onclick="setPercentage(8)">8%</button>
                            <button class="small-btn" onclick="setPercentage(9)">9%</button>
                            <button class="small-btn" onclick="setPercentage(10)">10%</button>
                            <button class="small-btn" onclick="setPercentage(12)">12%</button>
                            <button class="small-btn" onclick="setPercentage(15)">15%</button>
                        </div>
                    </div>
                    
                    <div class="input-group">
                        <label>O INGRESE % PERSONALIZADO</label>
                        <input type="number" id="porcentaje" class="futuristic-input" placeholder="0.01 - 15.00" min="0.01" max="15" step="0.01">
                    </div>
                    
                    <div class="input-group">
                        <label>FECHA DE INICIO</label>
                        <input type="date" id="fechaInicio" class="futuristic-input">
                    </div>
                </div>
            </div>
            
            <!-- Botones de Acción -->
            <div class="action-buttons">
                <button class="action-btn save-btn" onclick="guardarInversion()">
                    <span>💾</span> GUARDAR
                </button>
                <button class="action-btn html-btn" onclick="descargarHTML()">
                    <span>📄</span> HTML
                </button>
                <button class="action-btn pdf-btn" onclick="descargarPDF()">
                    <span>📑</span> PDF
                </button>
            </div>
            
            <!-- Vista Previa -->
            <div class="card" style="margin-top: 30px;">
                <h2 class="card-title">⚡ VISTA PREVIA</h2>
                <div id="vistaPrevia">
                    <p style="text-align: center; color: var(--text-secondary); font-size: clamp(1rem, 3vw, 1.2em);">Complete los datos y guarde para ver la simulación</p>
                </div>
            </div>
        </div>
        
        <!-- Sección de Resultados Detallados -->
        <div id="results-section" style="display: none;">
            <div class="card">
                <h2 class="card-title">📊 RESULTADOS DETALLADOS</h2>

        // Función para cambiar entre secciones
        function showSection(section) {
            const calcSection = document.getElementById('calculator-section');
            const resultsSection = document.getElementById('results-section');
            const btns = document.querySelectorAll('.nav-btn');
            
            if (section === 'calculator') {
                calcSection.style.display = 'block';
                resultsSection.style.display = 'none';
                btns[0].classList.add('active');
                btns[1].classList.remove('active');
            } else {
                calcSection.style.display = 'none';
                resultsSection.style.display = 'block';
                btns[0].classList.remove('active');
                btns[1].classList.add('active');
                actualizarSelectorInversionistas();
            }
        }
        
        // Función para establecer porcentaje
        function setPercentage(percent) {
            porcentajeActual = percent;
            document.getElementById('porcentaje').value = percent;
            
            // Actualizar botones activos
            document.querySelectorAll('.small-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.includes(percent + '%')) {
                    btn.classList.add('active');
                }
            });
        }
        
        // Función para formatear fecha completa
        function formatearFechaCompleta(fecha) {
            const opciones = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            };
            return fecha.toLocaleDateString('es-ES', opciones);
        }
        
        // Función para calcular rendimientos con fechas correctas
        function calcularRendimientos(inversion, porcentaje, fechaInicio) {
            const diasLaborales = 20;
            const resultados = [];
            let capitalActual = parseFloat(inversion);
            const fecha = new Date(fechaInicio);
            
            for (let i = 0; i < diasLaborales; i++) {
                while (fecha.getDay() === 0 || fecha.getDay() === 6) {
                    fecha.setDate(fecha.getDate() + 1);
                }
                
                const rendimientoDiario = capitalActual * (porcentaje / 100);
                capitalActual += rendimientoDiario;
                
                const fechaObj = new Date(fecha);
                
                resultados.push({
                    dia: i + 1,
                    fechaObj: fechaObj,
                    fechaCompleta: formatearFechaCompleta(fechaObj),
                    fechaCorta: fechaObj.toLocaleDateString('es-ES'),
                    fechaISO: fechaObj.toISOString().split('T')[0],
                    diaSemana: fechaObj.toLocaleDateString('es-ES', { weekday: 'long' }),
                    diaMes: fechaObj.getDate(),
                    mes: fechaObj.toLocaleDateString('es-ES', { month: 'long' }),
                    año: fechaObj.getFullYear(),
                    capitalInicial: capitalActual - rendimientoDiario,
                    rendimiento: rendimientoDiario,
                    capitalFinal: capitalActual,
                    porcentaje: porcentaje
                });
                
                fecha.setDate(fecha.getDate() + 1);
            }
            
            return resultados;
        }
        
        // Función para guardar inversión
        function guardarInversion() {
            const nombre = document.getElementById('nombre').value;
            const apellido = document.getElementById('apellido').value;
            const inversion = parseFloat(document.getElementById('inversion').value);
            const porcentaje = parseFloat(document.getElementById('porcentaje').value) || porcentajeActual;
            const fechaInicio = document.getElementById('fechaInicio').value;
            
            if (!nombre || !apellido || !inversion || !porcentaje || !fechaInicio) {
                alert('⚡ ERROR: Complete todos los campos');
                return;
            }
            
            if (porcentaje < 0.01 || porcentaje > 15) {
                alert('⚡ ERROR: El porcentaje debe estar entre 0.01% y 15%');
                return;
            }
            
            const resultados = calcularRendimientos(inversion, porcentaje, fechaInicio);
            
            const fechaFinal = new Date(resultados[resultados.length-1].fechaObj);
            
            const inversionCompleta = {
                id: Date.now(),
                nombre,
                apellido,
                inversion,
                porcentaje,
                fechaInicio,
                fechaFinal: fechaFinal.toISOString().split('T')[0],
                fechaFinalCompleta: formatearFechaCompleta(fechaFinal),
                resultados,
                fechaRegistro: new Date().toLocaleString(),
                fechaRegistroISO: new Date().toISOString()
            };
            
            inversionesGuardadas.push(inversionCompleta);
            localStorage.setItem('inversiones', JSON.stringify(inversionesGuardadas));
            
            mostrarVistaPrevia(inversionCompleta);
            
            document.getElementById('nombre').value = '';
            document.getElementById('apellido').value = '';
            document.getElementById('inversion').value = '';
            document.getElementById('porcentaje').value = '';
            document.getElementById('fechaInicio').value = new Date().toISOString().split('T')[0];
            
            alert('✅ INVERSIÓN GUARDADA CON ÉXITO');
        }

                    <div class="info-grid">

                return;

            selectorDiv.style.display = 'block';
            
            select.innerHTML = '<option value="">-- Seleccione un inversionista --</option>';
            inversionesGuardadas.forEach((inv, index) => {

                option.value = index;
                option.textContent = `${inv.nombre} ${inv.apellido} - $${inv.inversion} (${inv.porcentaje}%) - Inicio: ${inv.fechaInicio}`;
                select.appendChild(option);
            });

                                    <div style="color: #ffd700; font-size: 20px;">${roi}%</div>
                                </div>
                            </div>
                            
                            <p style="color: #a0a0ff;">Período: ${inversion.fechaInicio} al ${inversion.fechaFinal}</p>
                        </div>
                        
                        <div class="footer">
                            <p>⚡ HEYDIN KAYSER INVEST - Sistema Cuántico de Gestión ⚡</p>
                            <p>Documento generado el ${new Date().toLocaleString()}</p>
                        </div>
                    </div>
                </body>
                </html>
            `;
            
            return htmlCompleto;
        }
        
        // Función para descargar HTML (con colores amarillos)
        function descargarHTML() {
            const nombre = document.getElementById('nombre').value;
            const apellido = document.getElementById('apellido').value;
            const inversion = parseFloat(document.getElementById('inversion').value);
            const porcentaje = parseFloat(document.getElementById('porcentaje').value) || porcentajeActual;
            const fechaInicio = document.getElementById('fechaInicio').value;
            
            if (!nombre || !apellido || !inversion || !porcentaje || !fechaInicio) {
                alert('⚡ ERROR: Complete todos los campos para generar el reporte');
                return;
            }
            
            const resultados = calcularRendimientos(inversion, porcentaje, fechaInicio);
            const fechaFinal = new Date(resultados[resultados.length-1].fechaObj);
            
            const inversionTemp = {
                nombre,
                apellido,
                inversion,
                porcentaje,
                fechaInicio,
                fechaFinal: fechaFinal.toISOString().split('T')[0],
                resultados,
                fechaRegistro: new Date().toLocaleString()
            };
            
            const htmlContent = generarReportePDFCompleto(inversionTemp);
            
            const blob = new Blob([htmlContent], { type: 'text/html' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `HEYDIN_KAYSER_${nombre}_${apellido}_${fechaInicio}.html`;
            a.click();
        }
        
        // Función para descargar PDF (con colores amarillos)
        function descargarPDF() {
            const nombre = document.getElementById('nombre').value;
            const apellido = document.getElementById('apellido').value;
            const inversion = parseFloat(document.getElementById('inversion').value);
            const porcentaje = parseFloat(document.getElementById('porcentaje').value) || porcentajeActual;
            const fechaInicio = document.getElementById('fechaInicio').value;
            
            if (!nombre || !apellido || !inversion || !porcentaje || !fechaInicio) {
                alert('⚡ ERROR: Complete todos los campos para generar el PDF');
                return;
            }
            
            const resultados = calcularRendimientos(inversion, porcentaje, fechaInicio);
            const fechaFinal = new Date(resultados[resultados.length-1].fechaObj);
            
            const inversionTemp = {
                nombre,
                apellido,
                inversion,
                porcentaje,
                fechaInicio,
                fechaFinal: fechaFinal.toISOString().split('T')[0],
                resultados,
                fechaRegistro: new Date().toLocaleString()
            };
            
            const htmlContent = generarReportePDFCompleto(inversionTemp);
            
            // Crear elemento temporal para convertir a PDF
            const element = document.createElement('div');
            element.innerHTML = htmlContent;
            document.body.appendChild(element);
            
            const opt = {
                margin: [0.5, 0.5, 0.5, 0.5],
                filename: `HEYDIN_KAYSER_${nombre}_${apellido}_${fechaInicio}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { 
                    scale: 2, 
                    letterRendering: true, 
                    useCORS: true,
                    logging: false
                },
                jsPDF: { 
                    unit: 'in', 
                    format: 'a4', 
                    orientation: 'landscape' 
                }
            };
            
            html2pdf().set(opt).from(element).save().then(() => {
                document.body.removeChild(element);
            });
        }
        
        // Función para descargar reporte HTML guardado
        function descargarReporteHTML(index) {
            const inversion = inversionesGuardadas[index];

        // Cargar datos guardados al iniciar
        window.onload = function() {

            document.getElementById('fechaInicio').value = today;
            
            console.log("Sistema HEYDIN KAYSER INVEST iniciado correctamente");
